<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let ran = Math.random()
        let first , second , third;

        if (ran>0.33){
            first = "Crazy"
        }
        else if(ran<0.66 && ran>=0.33){
            first = "Engine"
        }
        else{
            first ="Bros"
        }

        //for second
        ran = Math.random()
        if (ran>0.33){
            second = "Amazing"
        }
        else if(ran<0.66 && ran>0.33){
            second = "Food"
        }
        else{
            second ="Limited"
        }

        //for third
        ran = Math.random()
        if (ran>0.33){
            third = "Fire"
        }
        else if(ran<0.66 && ran>0.33){
            third = "Garments"
        }
        else{
            third ="Hub"
        }

        console.log(`${first} ${second} ${third}`)
    </script>
</body>
</html>
